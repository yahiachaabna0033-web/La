name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip and find project
        run: |
          unzip BoosteroidChecker.zip -d extracted
          echo "=== Level 1 ==="
          ls extracted/
          echo "=== Level 2 ==="
          ls extracted/BoosteroidChecker/
          echo "=== Finding gradlew ==="
          find extracted -name "gradlew" -type f
          GRADLEW_PATH=$(find extracted -name "gradlew" -type f | head -1)
          PROJECT_DIR=$(dirname $GRADLEW_PATH)
          echo "Found at: $PROJECT_DIR"
          cp -r $PROJECT_DIR/. .

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BoosteroidChecker-APK
          path: app/build/outputs/apk/debug/app-debug.apk
